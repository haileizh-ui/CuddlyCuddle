/* ===== CSS 变量定义 ===== */
:root {
  --bg-color: #0a0e27;

/* ===== 全局基础与换行规则 ===== */

  word-wrap: break-word;

  overflow-wrap: break-word;

  background-color: var(--bg-color);
  font-family: 'Noto Sans SC', sans-serif;
  color: var(--text-color);

/* ===== 动态背景：数据流效果 ===== */
#data-stream-effect {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

.glyph {
  position: absolute;
  color: var(--primary-glow);
  font-family: 'Rajdhani', monospace;
  font-size: 14px;
  opacity: 0;
  animation: fall linear infinite;
  user-select: none;
}

@keyframes fall {
  0% {
    transform: translateY(-200px);
    opacity: 0;
  }
  10% {
    opacity: 0.7;
  }
  90% {
    opacity: 0.7;
  }
  100% {
    transform: translateY(800px); /* ⚠️ 关键：使用固定像素值 */

<script>
document.addEventListener('DOMContentLoaded', () => {
    // --- 状态变量 ---
    let page = 1;
    let total_count = 0;
    let total_page = 0;
    let page_size = 18;
    let results = []; //角色列表
    let currentKeywords = ''; // 当前搜索关键词

    // --- 动态背景 ---
    const streamContainer = document.getElementById('data-stream-effect');
    if (streamContainer) {
        const glyphs = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<>/?;:"|[]{}=+-_*&^%$#@!';
        const createGlyph = () => {
            const glyph = document.createElement('span');
            glyph.className = 'glyph';
            glyph.textContent = glyphs[Math.floor(Math.random() * glyphs.length)];
            glyph.style.left = Math.random() * 100 + 'vw';
            glyph.style.animationDuration = Math.random() * 5 + 5 + 's';
            glyph.style.animationDelay = Math.random() * 3 + 's';
            streamContainer.appendChild(glyph);
            setTimeout(() => { glyph.remove(); }, 10000);
        };
        setInterval(createGlyph, 100);
    }

    const resultsContainer = document.getElementById('results-container');
    const paginationControls = document.getElementById('pagination-controls'); // 新增

    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const curPage = document.getElementById('page-info');
    
    prevBtn.addEventListener('click', () => {
        if (page > 1) {
            page--;
            updateDataUI();
            updatePaginationControls();
        }
    });

    nextBtn.addEventListener('click', () => {
        if (page < total_page) {
            page++;
            updateDataUI();
            updatePaginationControls();
        }
    });

    // --- 数字分页逻辑 ---
    const numberPaginationContainer = document.getElementById('number-pagination');
    
    const updateNumberPagination = () => {
        if (!numberPaginationContainer || total_page <= 1) {
            if (numberPaginationContainer) numberPaginationContainer.innerHTML = '';
            return;
