/* ===== CSS 变量定义 ===== */
:root {
  --bg-color: #0a0e27;
  --primary-glow: #00d9ff;
  --secondary-glow: #ff2a6d;
  --text-color: #e0e0e0;

/* ===== 全局基础与换行规则 ===== */
.cookii-ui-wrapper * {
  box-sizing: border-box;
  word-wrap: break-word;
  word-break: break-word;
  overflow-wrap: break-word;
}

.cookii-ui-wrapper {
  background-color: var(--bg-color);
  font-family: 'Noto Sans SC', sans-serif;
  color: var(--text-color);
  padding: 20px;
  position: relative;
  overflow: hidden; /* 关键：防止特效溢出 */
  border-radius: 15px;
}

/* ===== 动态背景：数据流效果 ===== */
#data-stream-effect {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

.glyph {
  position: absolute;
  color: var(--primary-glow);
  font-family: 'Rajdhani', monospace;
  font-size: 14px;
  opacity: 0;
  animation: fall linear infinite;
  user-select: none;
}

@keyframes fall {
  0% {
    transform: translateY(-200px);
    opacity: 0;
  }
  10% {
    opacity: 0.7;
  }
  90% {
    opacity: 0.7;
  }
  100% {
    transform: translateY(800px); /* ⚠️ 关键：使用固定像素值 */
    opacity: 0;
  }
}

/* ===== 主容器与标题 ===== */
.container {

}

.title {

<script>
document.addEventListener('DOMContentLoaded', () => {
    // --- 状态变量 ---
    let page = 1;
    let total_count = 0;
    let total_page = 0;
    let page_size = 6;
    let results = []; //角色列表

    // --- 动态背景 ---
    const streamContainer = document.getElementById('data-stream-effect');
    if (streamContainer) {
        const glyphs = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<>/?;:"|[]{}=+-_*&^%$#@!';
        const createGlyph = () => {
            const glyph = document.createElement('span');
            glyph.className = 'glyph';
            glyph.textContent = glyphs[Math.floor(Math.random() * glyphs.length)];
            glyph.style.left = Math.random() * 100 + 'vw';
            glyph.style.animationDuration = Math.random() * 5 + 5 + 's';
            glyph.style.animationDelay = Math.random() * 3 + 's';
            streamContainer.appendChild(glyph);
            setTimeout(() => { glyph.remove(); }, 10000);
        };
        setInterval(createGlyph, 100);
    }

    const resultsContainer = document.getElementById('results-container');
    const paginationControls = document.getElementById('pagination-controls'); // 新增

    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const curPage = document.getElementById('page-info');
    const pageNumbersContainer = document.getElementById('page-numbers');

    prevBtn.addEventListener('click', () => {
        if (page > 1) {
            page--;
            updateResultsUI();
            updatePaginationControls();
        }
    });

    nextBtn.addEventListener('click', () => {
        if (page < total_page) {
            page++;
            updateResultsUI();
            updatePaginationControls();
        }
    });

    // 点击页码数字
    const handlePageNumberClick = (pageNum) => {
        if (pageNum !== page && pageNum >= 1 && pageNum <= total_page) {
            page = pageNum;
            updateResultsUI();
            updatePaginationControls();
        }
    };

    // 辅助函数：更新单个角色卡片
    const updateCharCard = (index, charData) => {
        const img = document.getElementById(`charillu${index}`);
        const link = document.getElementById(`chat_char${index}`);
        const likeCount = document.getElementById(`like-count-${index}`);
        
        if (charData) {
            img.src = charData.img_src;
            img.title = charData.text;
            link.href = "https://danime.dawoai.com/character/chat.html?char_id=" + encodeURIComponent(charData.char_id);
            
            // 更新点赞数 
            const likes = charData.like_count || 0;
            likeCount.textContent = formatNumber(likes);
            likeCount.style.display = 'flex';
        } else {
            img.src = '';
            img.title = '';
            link.href = '';
            likeCount.style.display = 'none';
        }
    };

    // 格式化数字（超过1000显示为1k）
    const formatNumber = (num) => {
        if (num >= 1000000) {
            return (num / 1000000).toFixed(1) + 'M';
        } else if (num >= 1000) {
            return (num / 1000).toFixed(1) + 'k';
        }
        return num.toString();
    };

    const updateResultsUI = () => {
        fetch(`https://danime.dawoai.com/v1/dialogue/character_list?page=${page}&page_size=${page_size}&query=chars&d=1`)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                // 3. 更新UI
                total_count = data.total;
                total_page = data.total_pages;
                page = data.page;
                page_size = data.page_size;

                // 更新6个角色卡片
                for (let i = 0; i < 6; i++) {
                    updateCharCard(i + 1, data.data && data.data[i] ? data.data[i] : null);
                }
            })
            .catch(error => {
                console.error('load character_list fail: ', error);
                resultsContainer.style.display = 'none';
                // 可以添加一个错误提示
            });
    };

    const updateDataUI = () => {
        fetch(`https://danime.dawoai.com/v1/dialogue/character_list?page=${page}&page_size=${page_size}&query=chars&d=1`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    // 3. 更新UI
                    results = data.data;
                    total_count = data.total_count;
                    page = 1;
                    total_page = data.total_pages;

                    // 更新6个角色卡片
                    for (let i = 0; i < 6; i++) {
                        updateCharCard(i + 1, data.data && data.data[i] ? data.data[i] : null);
                    }

                    updatePaginationControls();
                })
                .catch(error => {
                console.error('load character_list fail: ', error);
                resultsContainer.style.display = 'none';
                // 可以添加一个错误提示
            });
    };

    updateDataUI();

    // --- UI 更新函数 ---
    const updatePaginationControls = () => {
        if (total_page > 0) {
            curPage.textContent = ` 共${total_page}页`;
            prevBtn.disabled = page <= 1;
            nextBtn.disabled = page >= total_page;

            // 更新页码数字按钮
            updatePageNumbers();
        } else {
            curPage.textContent = '';
            prevBtn.disabled = true;
            nextBtn.disabled = true;
            pageNumbersContainer.innerHTML = '';
        }
    };

    // 更新页码数字按钮
    const updatePageNumbers = () => {
        pageNumbersContainer.innerHTML = '';

        if (total_page <= 1) return;

        // 计算要显示的页码范围
        let startPage = Math.max(1, page - 4);
        let endPage = Math.min(total_page, page + 4);

        // 确保最多显示9个页码
        if (endPage - startPage + 1 > 9) {
            if (page - startPage > endPage - page) {
                startPage = endPage - 8;
            } else {
                endPage = startPage + 8;
            }
        }

        // 生成页码按钮
        for (let i = startPage; i <= endPage; i++) {
            const btn = document.createElement('button');
            btn.className = 'page-number-btn';
            btn.textContent = i;

            if (i === page) {
                btn.classList.add('current');
            } else {
                btn.addEventListener('click', () => handlePageNumberClick(i));
            }

            pageNumbersContainer.appendChild(btn);
        }
    };
});
</script>
